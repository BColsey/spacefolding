<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#0d1117"/>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a371f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Stars -->
  <circle cx="60" cy="35" r="1.5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="180" cy="25" r="1" fill="#a371f7" opacity="0.5"/>
  <circle cx="320" cy="40" r="1.2" fill="#58a6ff" opacity="0.4"/>
  <circle cx="480" cy="30" r="1.8" fill="#a371f7" opacity="0.6"/>
  <circle cx="700" cy="28" r="1.5" fill="#a371f7" opacity="0.4"/>

  <!-- Unfolded plane -->
  <polygon points="50,30 250,15 250,85 50,100" fill="#58a6ff" fill-opacity="0.1" stroke="#58a6ff" stroke-width="1"/>
  
  <!-- Fold lines -->
  <line x1="250" y1="50" x2="320" y2="100" stroke="url(#grad)" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Mid fold -->
  <polygon points="320,60 500,50 500,110 320,120" fill="#a371f7" fill-opacity="0.08" stroke="#a371f7" stroke-width="1"/>
  
  <line x1="500" y1="80" x2="560" y2="110" stroke="url(#grad)" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Folded plane -->
  <polygon points="560,85 700,80 700,120 560,125" fill="#58a6ff" fill-opacity="0.06" stroke="#58a6ff" stroke-width="1"/>

  <!-- Convergence arrow -->
  <polygon points="700,100 740,85 740,95 780,100 740,105 740,115" fill="url(#grad)" opacity="0.5"/>

  <!-- Title -->
  <text x="400" y="170" font-family="monospace" font-size="38" font-weight="bold" text-anchor="middle" fill="url(#grad)" letter-spacing="12">SPACEFOLDING</text>

  <text x="400" y="192" font-family="monospace" font-size="11" text-anchor="middle" fill="#8b949e" letter-spacing="3">CONTEXT COMPRESSION &amp; ROUTING FOR CODING AGENTS</text>
</svg>
