name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

  acceptance-benchmark:
    name: Retrieval acceptance gate (informational)
    runs-on: ubuntu-latest
    # STILL NON-BLOCKING — but now for an honest, documented reason (WS0.6/Task 2).
    # The gate itself is fixed: the retrieval gate is the composite condition
    # (structural hybrid non-inferior to the strongest lexical baseline — BM25F /
    # FTS / keyword — on recall@10 AND strictly beating FTS on hits@1, via paired
    # bootstrap CIs), replacing the old `structural beats keyword` strawman; the
    # E2E thresholds are recalibrated off the contaminated 0.95/0.35 to honest
    # floors. It CANNOT be flipped to blocking on this (deterministic, CPU) runner:
    # the composite claim depends on the GPU code-specific embedding model and is
    # validated there (django/typescript) — see benchmarks/COMMIT-DERIVED-FINDINGS.md.
    # With deterministic (hash) embeddings the vector arm ≈ random, so the gate
    # fails honestly on most commit-derived corpora; with the general `local` bge
    # model it fails too (over-trusting a weak vector arm lowers top-1). Blocking
    # requires either a GPU-code-model CI runner or narrowing the blocking claim to
    # the regime-robust subset. Do NOT set continue-on-error:false by lowering the
    # bar. Until then it runs for visibility only.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Retrieval ranking + E2E acceptance gate (deterministic, offline)
        run: |
          npx tsx benchmarks/evaluate.ts --strategy all --json > eval.json
          npx tsx benchmarks/e2e-benchmark.ts --strategy structural --json > e2e.json
          npx tsx benchmarks/check-acceptance.ts --retrieval-json eval.json --e2e-json e2e.json
      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            eval.json
            e2e.json
