name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test

  acceptance-benchmark:
    name: Retrieval acceptance gate (informational)
    runs-on: ubuntu-latest
    # INFORMATIONAL (non-blocking) — the FULL composite gate, for visibility.
    # The retrieval gate is the composite condition (structural hybrid non-inferior
    # to the strongest lexical baseline — BM25F / FTS / keyword — on recall@10 AND
    # strictly beating FTS on hits@1, via paired bootstrap CIs); the E2E thresholds
    # are the honest 0.70/0.25 floors. This composite claim is regime-dependent —
    # it holds on the GPU code-embedding model (django/typescript) and FAILS on the
    # deterministic provider used here, so it cannot be the blocking gate on this
    # CPU runner. The regime-robust BLOCKING subset (non-regression vs the pinned
    # deterministic baseline + harness health) runs in the acceptance-blocking job
    # below; see docs/decisions/adr-001-regime-robust-blocking-gate.md.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Retrieval ranking + E2E acceptance gate (deterministic, offline)
        run: |
          npx tsx benchmarks/evaluate.ts --strategy all --json > eval.json
          npx tsx benchmarks/e2e-benchmark.ts --strategy structural --json > e2e.json
          npx tsx benchmarks/check-acceptance.ts --retrieval-json eval.json --e2e-json e2e.json
      - name: Upload benchmark JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            eval.json
            e2e.json

  acceptance-blocking:
    name: Retrieval non-regression gate (BLOCKING, deterministic)
    runs-on: ubuntu-latest
    # BLOCKING — the regime-robust subset of the acceptance gate that holds on the
    # deterministic provider (no GPU, no superiority claim). It is a NON-REGRESSION
    # guard against the pinned deterministic baseline
    # (benchmarks/baselines/deterministic-baseline.json): all 8 retrieval strategies
    # reported, composite contrasts computed, and structural/fts/bm25/keyword
    # recall@10 & hits@1 not below baseline − margin. This is NOT the composite
    # superiority claim — that is regime-dependent (holds on the GPU code-embedding
    # model only) and stays informational in the acceptance-benchmark job above.
    # Deterministic hash embeddings make the baseline exact, so this guard is
    # non-flaky. See docs/decisions/adr-001-regime-robust-blocking-gate.md.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deterministic retrieval eval (depth 200, matches the pinned baseline)
        run: |
          BENCHMARK_RETRIEVAL_DEPTH=200 npx tsx benchmarks/evaluate.ts --strategy all --json > eval.json
      - name: Blocking non-regression gate
        run: |
          npx tsx benchmarks/check-acceptance.ts --blocking-subset --retrieval-json eval.json
      - name: Upload blocking-gate eval JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: blocking-gate-results
          path: eval.json
